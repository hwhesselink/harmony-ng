substitutions:
  name: tv-room-gw
  friendly_name: TV Room

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: 3.1
      sram1_as_iram: true

# Enable logging
logger:

globals:
  - id: vol_proto
    type: int
  - id: vol_address
    type: int
  - id: vol_up_int
    type: int
  - id: vol_down_int
    type: int
  - id: vol_up_str
    type: std::string
  - id: vol_down_str
    type: std::string
  - id: vol_len
    type: int
  - id: vol_repeats
    type: int
  - id: vol_repeat_wait
    type: int

remote_transmitter:
  - id: transmitter_ir
    pin:
      number: GPIO2
      ignore_strapping_warning: true
    carrier_duty_percent: 50%
    non_blocking: true

# Enable Home Assistant API
api:
  # batch_delay: 0ms  # Send state changes immediately
  encryption:
    key: !secret tv_room_gw__api_key
  actions:
    - action: set_volume_control
      variables:
        proto: int
        address: int
        up_int: int
        down_int: int
        up_str: string
        down_str: string
        len: int
        repeats: int
        repeat_wait: int
      then:
        - globals.set:
            id: vol_proto
            value: !lambda "return proto;"
        - globals.set:
            id: vol_address
            value: !lambda "return address;"
        - globals.set:
            id: vol_up_int
            value: !lambda "return up_int;"
        - globals.set:
            id: vol_down_int
            value: !lambda "return down_int;"
        - globals.set:
            id: vol_up_str
            value: !lambda "return up_str;"
        - globals.set:
            id: vol_down_str
            value: !lambda "return down_str;"
        - globals.set:
            id: vol_len
            value: !lambda "return len;"
        - globals.set:
            id: vol_repeats
            value: !lambda "return repeats;"
        - globals.set:
            id: vol_repeat_wait
            value: !lambda "return repeat_wait;"
    - action: tx_panasonic
      variables:
        address: int
        command: int
      then:
        - remote_transmitter.transmit_panasonic:
            address: !lambda 'return address;'
            command: !lambda 'return command;'
    - action: tx_pronto
      variables:
        data: string
      then:
        - remote_transmitter.transmit_pronto:
            data: !lambda 'return data;'
    - action: tx_pioneer
      variables:
        rc_code_1: int
        repeat: int
      then:
        - remote_transmitter.transmit_pioneer:
            rc_code_1: !lambda 'return rc_code_1;'
            repeat:
              times: !lambda 'return repeat;'
    - action: tx_pioneer2
      variables:
        rc_code_1: int
        rc_code_2: int
        repeat: int
      then:
        - remote_transmitter.transmit_pioneer:
            rc_code_1: !lambda 'return rc_code_1;'
            rc_code_2: !lambda 'return rc_code_2;'
            repeat:
              times: !lambda 'return repeat;'
    - action: tx_sony
      variables:
        data: int
        nbits: int
        wait: int
      then:
        - repeat:
            count: 3
            then:
              - remote_transmitter.transmit_sony:
                  data: !lambda 'return data;'
                  nbits: !lambda 'return nbits;'
              - delay: !lambda "return wait;"
    - action: tx_jvc
      variables:
        data: int
        repeat: int
        wait: int
      then:
        - repeat:
            count: !lambda 'return repeat;'
            then:
              - remote_transmitter.transmit_jvc:
                  data: !lambda 'return data;'
              - delay: !lambda "return wait;"
    - action: tx_jvcj
      variables:
        data: int
        repeat: int
        wait: int
      then:
        - repeat:
            count: !lambda 'return repeat;'
            then:
              - remote_transmitter.transmit_jvc:
                  data: !lambda 'return data;'
              - delay: !lambda "return wait;"
    - action: tx_lg
      variables:
        data: int
        nbits: int
        repeat: int
        wait: int
      then:
        - repeat:
            count: !lambda 'return repeat;'
            then:
              - remote_transmitter.transmit_lg:
                  data: !lambda 'return data;'
                  nbits: !lambda 'return nbits;'
              - delay: !lambda "return wait;"
    - action: tx_nec
      variables:
        address: int
        command: int
      then:
         - remote_transmitter.transmit_nec:
              address: !lambda 'return address;'
              command: !lambda 'return command;'

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: !secret tv_room_gw__ota_password

wifi:
  ssid: !secret wifi_ssid_iot
  password: !secret wifi_password_iot
  # use_address: 10.11.2.236
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "TV Room Fallback Hotspot"
    password: !secret tv_room_gw__ap_password

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

# To have a "next url" for improv serial
web_server:

debug:

sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wifi Signal Strength"
    update_interval: 60s
  - platform: uptime
    name: "${friendly_name} Uptime"

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"

button:
  # Restart the ESP
  - platform: restart
    name: "${friendly_name} reboot"
  - platform: template
    name: "Volume UP"
    id: volume_up
    on_press:
      - repeat:
          count: !lambda "return id(vol_repeats);"
          then:
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 1);'
                then:
                  - remote_transmitter.transmit_pronto:
                      data: !lambda "return id(vol_up_str);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 3);'
                then:
                  - remote_transmitter.transmit_nec:
                      address: !lambda "return id(vol_address);"
                      command: !lambda "return id(vol_up_int);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 4);'
                then:
                  - remote_transmitter.transmit_panasonic:
                      address: !lambda "return id(vol_address);"
                      command: !lambda "return id(vol_up_int);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 5);'
                then:
                  - remote_transmitter.transmit_pioneer:
                      rc_code_1: !lambda "return id(vol_up_int);"
            - delay: !lambda "return id(vol_repeat_wait);"
  - platform: template
    name: "Volume DOWN"
    id: volume_down
    on_press:
      - repeat:
          count: !lambda "return id(vol_repeats);"
          then:
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 1);'
                then:
                  - remote_transmitter.transmit_pronto:
                      data: !lambda "return id(vol_down_str);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 3);'
                then:
                  - remote_transmitter.transmit_nec:
                      address: !lambda "return id(vol_address);"
                      command: !lambda "return id(vol_down_int);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 4);'
                then:
                  - remote_transmitter.transmit_panasonic:
                      address: !lambda "return id(vol_address);"
                      command: !lambda "return id(vol_down_int);"
            - if:
                condition:
                  lambda: 'return (id(vol_proto) == 5);'
                then:
                  - remote_transmitter.transmit_pioneer:
                      rc_code_1: !lambda "return id(vol_down_int);"
            - delay: !lambda "return id(vol_repeat_wait);"

packages:
#  remote_rcvr_ir: !include common/remote_rcvr_ir.yaml
  remote_rcvr_rf: !include common/remote_rcvr_rf.yaml